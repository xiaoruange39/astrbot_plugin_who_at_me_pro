<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>谁艾特我Pro设置</title>
<style id="previewFontStyle"></style>
<style>
:root {
  --bg:#f3f5f8;
  --panel:#fff;
  --panel2:#f8fafc;
  --text:#172033;
  --muted:#667085;
  --line:#dbe3ec;
  --blue:#1e7bff;
  --blue2:#eaf2ff;
  --red:#e5484d;
  --shadow:0 10px 28px rgba(17,24,39,.08);
}
* { box-sizing:border-box }
body {
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
}
.wrap { max-width:1180px; margin:0 auto; padding:28px 24px 40px }
.head { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:18px }
h1 { margin:0; font-size:26px; line-height:1.2 }
.sub { margin-top:6px; color:var(--muted); font-size:13px }
.grid { display:grid; grid-template-columns:minmax(360px,430px) 1fr; gap:18px; align-items:start }
.card {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.card h2 {
  margin:0;
  padding:16px 18px;
  border-bottom:1px solid var(--line);
  font-size:17px;
}
.section { padding:18px }
.row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px }
label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px }
input[type=number] {
  width:100%;
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px 11px;
  font-size:15px;
  outline:none;
  background:#fff;
  color:var(--text);
}
input[type=number]:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(30,123,255,.12) }
input[type=checkbox] { width:16px; height:16px; accent-color:var(--blue) }
input[type=file] { display:none }
.check {
  display:flex;
  align-items:center;
  gap:8px;
  margin:0 0 14px;
  color:var(--text);
  font-size:14px;
  font-weight:700;
}
.actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:4px }
button {
  border:0;
  border-radius:8px;
  padding:10px 14px;
  font-size:14px;
  font-weight:750;
  cursor:pointer;
  color:var(--blue);
  background:var(--blue2);
}
button.primary { color:#fff; background:var(--blue) }
button.danger { color:var(--red); background:#fff1f1 }
button:disabled { opacity:.55; cursor:not-allowed }
.msg { min-height:22px; margin-top:12px; color:var(--muted); font-size:13px }
.preview-wrap { padding:18px; overflow:auto }
.phone {
  width:600px;
  min-height:190px;
  background:#f2f3f5;
  position:relative;
  border-radius:8px;
  overflow:hidden;
  border:1px solid #dfe4ea;
  transform-origin:top left;
}
.phone.font-bold, .phone.font-bold * {
  font-weight:900 !important;
  text-shadow:0.35px 0 0 currentColor;
}
.preview-header {
  min-height:64px;
  background:#fdfdfd;
  position:relative;
  border-bottom:1px solid #e7eaef;
}
.preview-header-img {
  display:block;
  width:100%;
  height:auto;
  min-height:64px;
}
.preview-time {
  position:absolute;
  top:7px;
  left:30px;
  font-size:16px;
  font-weight:800;
  color:#111;
}
.preview-group {
  position:absolute;
  top:45px;
  left:56px;
  right:56px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  font-size:22px;
  line-height:1.2;
  font-weight:850;
  color:#000;
}
.preview-chat { padding:20px 16px 22px; display:flex; gap:12px }
.avatar {
  width:50px;
  height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#1f8fff,#28c2d1);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:850;
  flex:0 0 50px;
}
.preview-footer {
  min-height:58px;
  background:#fff;
}
.preview-footer img {
  display:block;
  width:100%;
  min-height:58px;
  object-fit:cover;
}
.img-missing {
  height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:12px;
  border-top:1px solid #e7eaef;
}
.image-status {
  margin-top:12px;
  display:grid;
  gap:6px;
  color:var(--muted);
  font-size:12px;
  word-break:break-all;
}
.image-status span { color:var(--text); font-weight:700 }
.bubble { max-width:380px }
.meta { display:flex; gap:8px; align-items:center; margin:0 0 6px 2px; color:#666; font-size:14px; font-weight:700 }
.tag { background:#b9bcc2; color:#fff; border-radius:4px; padding:3px 6px; font-size:11px; line-height:1; font-weight:800 }
.msg-bubble {
  display:inline-block;
  border:1px solid #cce0ff;
  background:#eef5ff;
  border-radius:4px 16px 16px 16px;
  padding:12px 16px;
  color:#000;
  font-size:18px;
  line-height:1.4;
  font-weight:850;
}
.at { color:#1e6fff; margin-right:6px }
.font-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px }
.font-item {
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel2);
  padding:13px;
}
.font-item.current { border-color:var(--blue); background:var(--blue2) }
.font-name { font-weight:800; word-break:break-all; margin-bottom:5px }
.font-meta { color:var(--muted); font-size:12px; margin-bottom:10px }
.font-actions { display:flex; gap:8px; flex-wrap:wrap }
@media (max-width:900px) {
  .grid { grid-template-columns:1fr }
  .phone { transform:scale(.82); margin-bottom:-34px }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>谁艾特我Pro渲染设置</h1>
      <div class="sub">调整结果图顶部时间、群名称位置，并管理生成图片使用的字体。</div>
    </div>
    <button id="reloadBtn">刷新</button>
  </div>

  <div class="grid">
    <div class="card">
      <h2>顶部文字</h2>
      <div class="section">
        <div class="row">
          <div><label for="timeX">时间 X</label><input id="timeX" type="number" min="0" max="600" step="1"></div>
          <div><label for="timeY">时间 Y</label><input id="timeY" type="number" min="0" max="120" step="1"></div>
        </div>
        <div class="row">
          <div><label for="timeFontSize">时间字号</label><input id="timeFontSize" type="number" min="8" max="72" step="1"></div>
          <div></div>
        </div>
        <div class="row">
          <div><label for="groupX">群名 X</label><input id="groupX" type="number" min="0" max="600" step="1"></div>
          <div><label for="groupY">群名 Y</label><input id="groupY" type="number" min="0" max="120" step="1"></div>
        </div>
        <div class="row">
          <div><label for="groupFontSize">群名字号</label><input id="groupFontSize" type="number" min="8" max="96" step="1"></div>
          <div></div>
        </div>
        <label class="check"><input id="fontBold" type="checkbox"> 整页字体加粗</label>
        <div class="actions">
          <button class="primary" id="saveLayout">保存文字设置</button>
          <button id="resetLayout">恢复默认</button>
        </div>
        <div class="msg" id="layoutMsg"></div>
      </div>

      <h2>字体</h2>
      <div class="section">
        <input id="fontFile" type="file" accept=".ttf,.otf,.woff,.woff2,.ttc">
        <div class="actions">
          <button class="primary" id="uploadFont">上传字体</button>
          <button id="defaultFont">使用默认字体</button>
        </div>
        <div class="msg" id="fontMsg"></div>
      </div>

      <h2>图片</h2>
      <div class="section">
        <input id="headerImageFile" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
        <input id="footerImageFile" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
        <div class="actions">
          <button class="primary" id="uploadHeaderImage">上传顶部图</button>
          <button id="resetHeaderImage">顶部图恢复默认</button>
        </div>
        <div class="actions">
          <button class="primary" id="uploadFooterImage">上传底部图</button>
          <button id="resetFooterImage">底部图恢复默认</button>
        </div>
        <div class="msg" id="imageMsg"></div>
      </div>
    </div>

    <div class="card">
      <h2>预览</h2>
      <div class="preview-wrap">
        <div class="phone" id="previewPhone">
          <div class="preview-header">
            <img id="previewHeaderImage" class="preview-header-img" alt="">
            <div class="preview-time" id="previewTime">21:30</div>
            <div class="preview-group" id="previewGroup">AstrBot交流群(128) 👂</div>
          </div>
          <div class="preview-chat">
            <div class="avatar">B</div>
            <div class="bubble">
              <div class="meta"><span class="tag">LV100 群主</span><span>bot</span></div>
              <div class="msg-bubble"><span class="at">@xxx</span> 这是一条艾特记录预览</div>
            </div>
          </div>
          <div class="preview-footer" id="previewFooter"></div>
        </div>
        <div class="image-status" id="imageStatus"></div>
      </div>
      <div class="section">
        <div class="font-list" id="fontList"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
const B = window.AstrBotPluginPage;
if (B) await B.ready();

const defaults = { time_x:30, time_y:7, time_font_size:16, group_x:56, group_y:45, group_font_size:22, font_bold:false };
const defaultImages = { header:'', footer:'' };
let state = { layout:{ ...defaults }, fonts:[], current_name:'', images:{ ...defaultImages } };

const $ = id => document.getElementById(id);
const fields = {
  time_x: $('timeX'),
  time_y: $('timeY'),
  time_font_size: $('timeFontSize'),
  group_x: $('groupX'),
  group_y: $('groupY'),
  group_font_size: $('groupFontSize'),
  font_bold: $('fontBold')
};

function dataOf(resp) { return resp && resp.data ? resp.data : resp; }
function apiGet(path) {
  if (B && B.apiGet) return B.apiGet(path);
  return fetch(path).then(r => r.json());
}
function apiPost(path, payload) {
  if (B && B.apiPost) return B.apiPost(path, payload || {});
  return fetch(path, { method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify(payload || {}) }).then(r => r.json());
}
function setMsg(id, text) { $(id).textContent = text || ''; }
function readLayout() {
  return {
    time_x: Number(fields.time_x.value || defaults.time_x),
    time_y: Number(fields.time_y.value || defaults.time_y),
    time_font_size: Number(fields.time_font_size.value || defaults.time_font_size),
    group_x: Number(fields.group_x.value || defaults.group_x),
    group_y: Number(fields.group_y.value || defaults.group_y),
    group_font_size: Number(fields.group_font_size.value || defaults.group_font_size),
    font_bold: Boolean(fields.font_bold.checked)
  };
}
function fillLayout(layout) {
  const l = { ...defaults, ...(layout || {}) };
  fields.time_x.value = l.time_x;
  fields.time_y.value = l.time_y;
  fields.time_font_size.value = l.time_font_size;
  fields.group_x.value = l.group_x;
  fields.group_y.value = l.group_y;
  fields.group_font_size.value = l.group_font_size;
  fields.font_bold.checked = Boolean(l.font_bold);
  updatePreview();
}
function updatePreview() {
  const l = readLayout();
  $('previewTime').style.left = l.time_x + 'px';
  $('previewTime').style.top = l.time_y + 'px';
  $('previewTime').style.fontSize = l.time_font_size + 'px';
  $('previewGroup').style.left = l.group_x + 'px';
  $('previewGroup').style.top = l.group_y + 'px';
  $('previewGroup').style.fontSize = l.group_font_size + 'px';
  $('previewPhone').classList.toggle('font-bold', Boolean(l.font_bold));
}
function updatePreviewFont() {
  $('previewFontStyle').textContent = state.current_font_css || '';
}
function updatePreviewImages() {
  const images = { ...defaultImages, ...(state.images || {}) };
  const header = images.header || '';
  const footer = images.footer || '';
  const headerSource = images.header_source || '默认图片';
  const footerSource = images.footer_source || '默认图片';
  const headerImg = $('previewHeaderImage');
  headerImg.style.display = header ? 'block' : 'none';
  headerImg.onerror = () => { headerImg.style.display = 'none'; };
  headerImg.src = header || '';
  const footerEl = $('previewFooter');
  if (!footer) {
    footerEl.innerHTML = '<div class="img-missing">未设置底部图片</div>';
  } else {
    footerEl.innerHTML = '';
    const footerImg = document.createElement('img');
    footerImg.id = 'previewFooterImage';
    footerImg.alt = '';
    footerImg.onerror = () => {
      footerEl.innerHTML = '<div class="img-missing">底部图片加载失败</div>';
    };
    footerImg.src = footer;
    footerEl.appendChild(footerImg);
  }
  $('imageStatus').innerHTML =
    '<div><span>顶部图：</span>' + escapeHtml(headerSource) + '</div>'
    + '<div><span>底部图：</span>' + escapeHtml(footerSource) + '</div>';
}
function renderFonts() {
  const fonts = state.fonts || [];
  if (!fonts.length) {
    $('fontList').innerHTML = '<div class="msg">还没有上传字体。</div>';
    return;
  }
  $('fontList').innerHTML = fonts.map(f => (
    '<div class="font-item' + (f.is_current ? ' current' : '') + '">'
    + '<div class="font-name">' + escapeHtml(f.name) + '</div>'
    + '<div class="font-meta">' + escapeHtml(f.size_text || '') + (f.is_current ? ' · 使用中' : '') + '</div>'
    + '<div class="font-actions">'
    + '<button class="use-font" data-path="' + escapeAttr(f.path) + '">使用</button>'
    + '<button class="danger del-font" data-path="' + escapeAttr(f.path) + '">删除</button>'
    + '</div></div>'
  )).join('');
  document.querySelectorAll('.use-font').forEach(btn => {
    btn.onclick = () => selectFont(btn.dataset.path);
  });
  document.querySelectorAll('.del-font').forEach(btn => {
    btn.onclick = () => deleteFont(btn.dataset.path);
  });
}
function escapeHtml(text) {
  return String(text || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(text) { return escapeHtml(text).replace(/`/g, '&#96;'); }
async function loadAll() {
  setMsg('layoutMsg', '加载中...');
  try {
    const resp = await apiGet('layout');
    state = dataOf(resp) || state;
    fillLayout(state.layout);
    updatePreviewFont();
    updatePreviewImages();
    renderFonts();
    setMsg('layoutMsg', '');
    setMsg('fontMsg', state.current_name ? '当前字体：' + state.current_name : '当前字体：默认字体');
  } catch (e) {
    setMsg('layoutMsg', '加载失败');
    updatePreviewImages();
  }
}
async function saveLayout(layout) {
  setMsg('layoutMsg', '保存中...');
  const resp = await apiPost('layout', { layout });
  if (resp && resp.status === 'error') {
    setMsg('layoutMsg', resp.message || '保存失败');
    return;
  }
  state = dataOf(resp) || state;
  fillLayout(state.layout);
  updatePreviewFont();
  setMsg('layoutMsg', '已保存');
}
function uploadFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => apiPost('fonts/upload', { filename:file.name, content:String(reader.result || '') }).then(resolve).catch(reject);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function uploadImage(kind, file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => apiPost('images/upload', { kind, filename:file.name, content:String(reader.result || '') }).then(resolve).catch(reject);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function selectFont(path) {
  setMsg('fontMsg', '保存中...');
  const resp = await apiPost('fonts/select', { font_path:path || '' });
  setMsg('fontMsg', resp && resp.status === 'error' ? resp.message : '字体设置已保存');
  await loadAll();
}
async function deleteFont(path) {
  setMsg('fontMsg', '删除中...');
  const resp = await apiPost('fonts/delete', { font_path:path || '' });
  setMsg('fontMsg', resp && resp.status === 'error' ? resp.message : '字体已删除');
  await loadAll();
}
async function resetImage(kind) {
  setMsg('imageMsg', '恢复中...');
  const resp = await apiPost('images/reset', { kind });
  setMsg('imageMsg', resp && resp.status === 'error' ? resp.message : '已恢复默认图片');
  await loadAll();
}

Object.values(fields).forEach(input => {
  input.addEventListener('input', updatePreview);
  input.addEventListener('change', updatePreview);
});
$('saveLayout').onclick = () => saveLayout(readLayout());
$('resetLayout').onclick = () => saveLayout(defaults);
$('reloadBtn').onclick = loadAll;
$('defaultFont').onclick = () => selectFont('');
$('uploadFont').onclick = () => $('fontFile').click();
$('uploadHeaderImage').onclick = () => $('headerImageFile').click();
$('uploadFooterImage').onclick = () => $('footerImageFile').click();
$('resetHeaderImage').onclick = () => resetImage('header');
$('resetFooterImage').onclick = () => resetImage('footer');
$('fontFile').onchange = async function() {
  const file = this.files && this.files[0];
  if (!file) return;
  setMsg('fontMsg', '上传中...');
  try {
    const resp = await uploadFile(file);
    setMsg('fontMsg', resp && resp.status === 'error' ? resp.message : '字体已上传并启用');
    this.value = '';
    await loadAll();
  } catch (e) {
    setMsg('fontMsg', '上传失败');
    this.value = '';
  }
};
for (const item of [
  ['headerImageFile', 'header', '顶部图'],
  ['footerImageFile', 'footer', '底部图']
]) {
  const [id, kind, label] = item;
  $(id).onchange = async function() {
    const file = this.files && this.files[0];
    if (!file) return;
    setMsg('imageMsg', label + '上传中...');
    try {
      const resp = await uploadImage(kind, file);
      setMsg('imageMsg', resp && resp.status === 'error' ? resp.message : label + '已上传并启用');
      this.value = '';
      await loadAll();
    } catch (e) {
      setMsg('imageMsg', label + '上传失败');
      this.value = '';
    }
  };
}
await loadAll();
</script>
</body>
</html>
